<!DOCTYPE html>
<html>
    <head>
        <caption>Student Information</caption>
    </head>
    <body>
        <table border="back">
            <tr>
                <th rowspan="6">Info</th>
                <th rowspan="2">Name</th>
                <th colspan="2">Address</th>
            </tr>
            <tr>
                <th>City</th>
                <th>House</th>
            </tr>
            <tr>
                <td>A</td>
                <td>Delhi</td>
                <td>1</td>
            </tr>
            <tr>
                <td>B</td>
                <td>Mumbai</td>
                <td>2</td>
            </tr>
            <tr>
                <td>C</td>
                <td>Kolkata</td>
                <td>3</td>
            </tr>
            <tr>
                <td>D</td>
                <td>Pune</td>
                <td>4</td>
            </tr>
        </table>
        <hr>
        <form action="/action">
            <div>
            <label for="name">Name:</label>
            <input type="text" id="name">
            </div>
            <div>
                    <label for="gender">Gender:</label>
                    <input type="radio" id="female" name="gender" value="female"/>
                    <label for="female">Female</label>
                    <input type="radio" id="male" name="gender" value="male"/>
                    <label for="male">male</label>             
            </div>
            <div>
                <label for="Country">Country:</label>
                <select name="country" id="country">
                    <option>Select an option</option>
                    <option value="India">India</option>
                    <option value="nepal">nepal</option>
                    <option value="USA">USA</option>
                     <option value="Canada">Canada</option>
                </select>
            </div>
            <div>
                <label for="message">Message:</label>
                <textarea id="message"></textarea>
            </div>
            <div>
                <input type="checkbox" id="sub" name="sub">
                <label for="sub">Subscribe</label>
            </div>
            <button type="submit">Submit</button>
        </form>

            <hr>
        <!-- FEEDBACK FORM -->
         <form action="/action"> 
            <h3>Feedback form</h3>
            <div>
            <label for="name"> Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your name"/>
            </div>
            <div>
                <label for="mail"> Email:</label>
            <input type="email" id="mail" name="name" placeholder="Enter your email"/>
            </div>
             <div>
                <label for="message">Message:</label>
                <textarea id="message"></textarea>
            </div>
             
                <label for="rate">Rate us out of 5:</label><br>
                <input type="radio" id="1" name="rate">
                <label for="rate">1</label>
                <br>
                 <input type="radio" id="2" name="rate">
                <label for="rate">2</label>
                <br>
                 <input type="radio" id="3" name="rate">
                <label for="rate">3</label>
                <br>
                 <input type="radio" id="4" name="rate">
                <label for="rate">4</label>
                <br>
                 <input type="radio" id="5" name="rate">
                <label for="rate">5</label><br>
                <button type="submit">Send your message</button>
                <hr>
            
         </form>
    </body>
</html>
