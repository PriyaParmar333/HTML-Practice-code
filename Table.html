<!DOCTYPE html>
<html>
    <head>
        <title> Table in HTML </title>
    </head>
    <body>
        <table border="black">
            <thead>
                <tr>
                    <th rowspan="2">Items</th>
                    <th colspan="2">prices</th>
                </tr>
                <tr>
                    <th>INR</th>
                    <th>USD</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>frooti</td>
                    <td>10</td>
                    <td>0.14</td>
                        
                </tr>
                <tr>
                    <td>samosa</td>
                    <td>12</td>
                    <td>0.17</td>
                        
                </tr>
                <tr>
                    <td>chips</td>
                    <td>20</td>
                    <td>0.28</td>
                        
                </tr>
            </tbody>
        </table>
    </body>

</html>
